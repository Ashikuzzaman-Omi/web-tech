<html>
<head>
    <title>Student Information</title>
    <link rel="stylesheet" href="lab3b.css">
</head>

<body>

<div class="container">

    <fieldset>
        <legend>Student Information</legend>

        <table>

            <tr>
                <td>
                    <label>Full Name (Text)</label><br>
                    <input type="text" placeholder="Enter your full name">
                </td>

                <td>
                    <label>Email Address</label><br>
                    <input type="email" placeholder="Ashikuzzamano980.gmail.com">
                </td>
            </tr>

            <tr>
                <td>
                    <label>Password</label><br>
                    <input type="password" placeholder="Enter secure password">
                </td>

                <td>
                    <label>Age (Number)</label><br>
                    <input type="number" placeholder="Enter your age">
                </td>
            </tr>

            <tr>
                <td>
                    <label>Experiment Date</label><br>
                    <input type="date">
                </td>

                <td>
                    <label>Phone Number (Tel)</label><br>
                    <input type="tel" placeholder="+880 123456789">
                </td>
            </tr>

            <tr>
                <td colspan="2" class="btn">
                    <input type="submit" value="Submit">
                    <input type="reset" value="Clear">
                </td>
            </tr>

        </table>

    </fieldset>

</div>

</body>
</html>
