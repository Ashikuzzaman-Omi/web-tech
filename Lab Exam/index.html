<html>

<head>
    <title>Student Registration</title>

    <link rel="stylesheet" type="text/css" href="style.css">

    <script src="script.js"></script>
</head>

<body>

    <div class="container">

        <fieldset>

            <legend>Student Registration Form</legend>

            <form onsubmit="return registerStudent();">

                <table>

                    <tr>
                        <td><b>First Name:</b></td>
                        <td><input type="text" id="fname"></td>
                        <td><p id="fnameError"></p></td>
                    </tr>

                    <tr>
                        <td><b>Last Name :</b></td>
                        <td><input type="text" id="lname"></td>
                        <td><p id="lnameError"></p></td>
                    </tr>

                    <tr>
                        <td><b>Student ID :</b></td>
                        <td><input type="text" id="sid"></td>
                        <td><p id="sidError"></p></td>
                    </tr>
                     <tr>
                        <td><b>Email :</b></td>
                        <td><input type="text" id="email"></td>
                        <td><p id="emailError"></p></td>
                    </tr>

                    <tr>
                        <td><b>Credit Completed :</b></td>
                        <td><input type="number" id="credit"></td>
                        <td><p id="creditError"></p></td>
                    </tr>

                    <tr>
                        <td><b>Department  :</b></td>

                        <td>

                            <select id="department">

                                <option value="">Select Department</option>

                                <option value="CSE">CSE</option>

                                <option value="CS">CS</option>

                                <option value="SE">SE</option>

                            </select>

                        </td>

                        <td><p id="departmentError"></p></td>

                    </tr>

                    <tr>

                        <td></td>

                        <td align="center">

                            <button type="submit">Submit</button>

                        </td>

                    </tr>

                </table>

            </form>

        </fieldset>

        <br>

        <h2>Registered Student List</h2>

        <table border="1" id="studentTable">

            <tr>

                <th>First Name</th>

                <th>Last Name</th>

                <th>Student ID</th>

                <th>Email</th>

                <th>Credit</th>

                <th>Department</th>

            </tr>

        </table>

    </div>

</body>

</html>
